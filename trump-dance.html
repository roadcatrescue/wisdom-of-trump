<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    overflow: hidden;
  }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="420" height="490"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Figure origin — body bobs up/down
const BASE_CX = 210, BASE_CY = 230;
let frame = 0;

// ── YMCA pose cycle (slower, ~90 frames each) ────────────────────────────────
const POSES = ['Y','M','C','A'];
let poseIdx = 0;
const POSE_FRAMES = 90;

// ── Arm segment definitions ──────────────────────────────────────────────────
// Each pose: upper-arm-end (elbow) and forearm-end (hand), relative to shoulder.
// Shoulders are at approx (±46, 0) relative to figure center.
// KEY: elbows stay LOW and tucked. Forearms do the work.

const poseArms = {
  //  [ [shoulder_offset], [elbow_offset_from_shoulder], [hand_offset_from_elbow] ]
  Y: {
    // Elbows tucked at sides, forearms angled upward-outward (slight spread)
    la: { elbow: [-10, 40], hand: [-35, -30] },
    ra: { elbow: [ 10, 40], hand: [  35, -30] },
  },
  M: {
    // Elbows low, both forearms pump up close to chest — the signature move
    la: { elbow: [-8,  38], hand: [-20, -55] },
    ra: { elbow: [  8, 38], hand: [  20, -55] },
  },
  C: {
    // Right forearm sweeps out to side, left stays low — asymmetric pump
    la: { elbow: [-10, 45], hand: [-15, 10] },
    ra: { elbow: [  5, 35], hand: [  70, -10] },
  },
  A: {
    // Both hands raised a bit higher, elbows still fairly low — triumphant pump
    la: { elbow: [-12, 42], hand: [-30, -65] },
    ra: { elbow: [  12, 42], hand: [  30, -65] },
  },
};

// ── Easing ───────────────────────────────────────────────────────────────────
function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }
function lerp(a, b, t) { return a + (b-a)*t; }
function lerp2(a, b, t) { return [lerp(a[0], b[0], t), lerp(a[1], b[1], t)]; }

function currentArms() {
  const cur  = POSES[poseIdx];
  const next = POSES[(poseIdx+1) % 4];
  const raw  = (frame % POSE_FRAMES) / POSE_FRAMES;
  // Only interpolate in the last 25% of the pose (snap, hold, snap)
  const t    = raw < 0.75 ? 0 : easeInOut((raw - 0.75) / 0.25);
  return {
    la: {
      elbow: lerp2(poseArms[cur].la.elbow, poseArms[next].la.elbow, t),
      hand:  lerp2(poseArms[cur].la.hand,  poseArms[next].la.hand,  t),
    },
    ra: {
      elbow: lerp2(poseArms[cur].ra.elbow, poseArms[next].ra.elbow, t),
      hand:  lerp2(poseArms[cur].ra.hand,  poseArms[next].ra.hand,  t),
    },
  };
}

// ── Drawing helpers ───────────────────────────────────────────────────────────
function oval(x, y, rx, ry, color, rot=0) {
  ctx.save(); ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(x, y, rx, ry, rot, 0, Math.PI*2);
  ctx.fill(); ctx.restore();
}

function drawHand(x, y, isRight, color) {
  // Simple palm + stubby fingers
  ctx.save(); ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(x, y, 13, 10, isRight ? 0.3 : -0.3, 0, Math.PI*2);
  ctx.fill();
  // Two knuckle bumps
  for (let i = -1; i <= 1; i += 2) {
    ctx.beginPath(); ctx.ellipse(x + i*6, y - 9, 4, 4, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ── Main draw ─────────────────────────────────────────────────────────────────
function drawTrump(mouthOpen, bobY, leanX) {
  const CX = BASE_CX + leanX;
  const CY = BASE_CY + bobY;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground shadow
  ctx.save(); ctx.globalAlpha = 0.2;
  oval(BASE_CX, BASE_CY + 200, 65, 12, '#000');
  ctx.restore();

  // ── Legs (slight weight-shift) ───────────────────────────────────────────
  const legRock = Math.sin(frame * 0.08) * 10;
  ctx.save();
  ctx.strokeStyle = '#1a1e38'; ctx.lineWidth = 30; ctx.lineCap = 'round';
  // Left leg
  ctx.beginPath();
  ctx.moveTo(CX-22, CY+100);
  ctx.quadraticCurveTo(CX-28+legRock*0.5, CY+155, CX-24+legRock, CY+195);
  ctx.stroke();
  // Right leg
  ctx.beginPath();
  ctx.moveTo(CX+22, CY+100);
  ctx.quadraticCurveTo(CX+28-legRock*0.5, CY+155, CX+24-legRock, CY+195);
  ctx.stroke();
  ctx.restore();
  // Shoes
  oval(CX-24+legRock,  CY+198, 22, 8, '#111');
  oval(CX+24-legRock,  CY+198, 22, 8, '#111');

  // ── Suit body ────────────────────────────────────────────────────────────
  ctx.save();
  ctx.fillStyle = '#1c2340';
  ctx.beginPath(); ctx.roundRect(CX-60, CY-28, 120, 132, 7); ctx.fill();
  // Lapels
  ctx.fillStyle = '#253060';
  ctx.beginPath();
  ctx.moveTo(CX-60, CY-28); ctx.lineTo(CX-14, CY-28);
  ctx.lineTo(CX, CY+15); ctx.lineTo(CX-60, CY+45); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(CX+60, CY-28); ctx.lineTo(CX+14, CY-28);
  ctx.lineTo(CX, CY+15); ctx.lineTo(CX+60, CY+45); ctx.closePath(); ctx.fill();
  // Shirt strip
  ctx.fillStyle = '#efefef';
  ctx.beginPath();
  ctx.moveTo(CX-11, CY-28); ctx.lineTo(CX+11, CY-28);
  ctx.lineTo(CX+7, CY+104); ctx.lineTo(CX-7, CY+104); ctx.fill();
  ctx.restore();

  // ── Tie (sways with body lean) ───────────────────────────────────────────
  const tieSway = leanX * 0.4 + Math.sin(frame * 0.09) * 4;
  ctx.save();
  ctx.fillStyle = '#cc0000';
  ctx.beginPath();
  ctx.moveTo(CX-9, CY-26); ctx.lineTo(CX+9, CY-26);
  ctx.lineTo(CX+16+tieSway, CY+125);
  ctx.lineTo(CX+2+tieSway,  CY+138);
  ctx.lineTo(CX-16+tieSway, CY+125);
  ctx.closePath(); ctx.fill();
  // Tie shine
  ctx.strokeStyle = 'rgba(255,80,80,0.35)'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(CX+1, CY-18); ctx.lineTo(CX+10+tieSway*0.6, CY+118); ctx.stroke();
  ctx.restore();

  // ── Arms ─────────────────────────────────────────────────────────────────
  const arms = currentArms();
  const LSX = CX - 46, LSY = CY + 5;  // left shoulder
  const RSX = CX + 46, RSY = CY + 5;  // right shoulder

  const LEX = LSX + arms.la.elbow[0], LEY = LSY + arms.la.elbow[1];
  const LHX = LEX + arms.la.hand[0],  LHY = LEY + arms.la.hand[1];
  const REX = RSX + arms.ra.elbow[0], REY = RSY + arms.ra.elbow[1];
  const RHX = REX + arms.ra.hand[0],  RHY = REY + arms.ra.hand[1];

  // Upper arms
  ctx.save(); ctx.strokeStyle = '#1c2340'; ctx.lineWidth = 26; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(LSX, LSY); ctx.lineTo(LEX, LEY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(RSX, RSY); ctx.lineTo(REX, REY); ctx.stroke();
  // Forearms
  ctx.lineWidth = 22;
  ctx.beginPath(); ctx.moveTo(LEX, LEY); ctx.lineTo(LHX, LHY); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(REX, REY); ctx.lineTo(RHX, RHY); ctx.stroke();
  ctx.restore();

  // Hands
  drawHand(LHX, LHY, false, '#F4A060');
  drawHand(RHX, RHY, true,  '#F4A060');

  // ── Neck ─────────────────────────────────────────────────────────────────
  ctx.fillStyle = '#F4A060';
  ctx.fillRect(CX-17, CY-68, 34, 44);

  // ── Face ─────────────────────────────────────────────────────────────────
  // Base
  oval(CX, CY-115, 67, 80, '#F4A060');
  // Pale eye zone (characteristic)
  oval(CX-21, CY-122, 19, 13, 'rgba(255,250,220,0.5)');
  oval(CX+21, CY-122, 19, 13, 'rgba(255,250,220,0.5)');

  // ── Hair ─────────────────────────────────────────────────────────────────
  ctx.save();
  // Main golden mound
  ctx.fillStyle = '#D4B030';
  ctx.beginPath(); ctx.ellipse(CX+4, CY-186, 64, 30, -0.05, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#E8C840';
  ctx.beginPath(); ctx.ellipse(CX+8, CY-184, 56, 24, -0.05, 0, Math.PI*2); ctx.fill();
  // Right side puff
  ctx.fillStyle = '#D4B030';
  ctx.beginPath(); ctx.ellipse(CX+52, CY-158, 20, 44, 0.65, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#E8C840';
  ctx.beginPath(); ctx.ellipse(CX+48, CY-158, 14, 36, 0.65, 0, Math.PI*2); ctx.fill();
  // Left side
  ctx.fillStyle = '#D4B030';
  ctx.beginPath(); ctx.ellipse(CX-48, CY-148, 22, 46, -0.55, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // ── Eyebrows (low, slightly angry) ───────────────────────────────────────
  ctx.save(); ctx.strokeStyle = '#7a5c20'; ctx.lineWidth = 5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(CX-37, CY-134); ctx.lineTo(CX-9, CY-128); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(CX+9,  CY-128); ctx.lineTo(CX+37, CY-134); ctx.stroke();
  ctx.restore();

  // ── Eyes ─────────────────────────────────────────────────────────────────
  oval(CX-22, CY-121, 10, 8, '#3a2818');
  oval(CX+22, CY-121, 10, 8, '#3a2818');
  oval(CX-21, CY-122,  5, 5, '#111');
  oval(CX+21, CY-122,  5, 5, '#111');
  oval(CX-19, CY-124,  2, 2, 'white');
  oval(CX+19, CY-124,  2, 2, 'white');

  // ── Nose ─────────────────────────────────────────────────────────────────
  ctx.save(); ctx.strokeStyle = '#c87840'; ctx.lineWidth = 3; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(CX-2, CY-108);
  ctx.quadraticCurveTo(CX+13, CY-95, CX+9, CY-83);
  ctx.quadraticCurveTo(CX, CY-79, CX-9, CY-83);
  ctx.stroke(); ctx.restore();

  // ── Mouth ─────────────────────────────────────────────────────────────────
  const mW  = 28;
  const mH  = mouthOpen * 30;
  const mY0 = CY - 70;

  // Cavity
  ctx.save();
  ctx.fillStyle = '#4a0808';
  ctx.beginPath();
  ctx.ellipse(CX, mY0 + mH*0.5, mW, Math.max(3, mH*0.55 + 3), 0, 0, Math.PI*2);
  ctx.fill();

  // Teeth (upper)
  if (mouthOpen > 0.2) {
    ctx.fillStyle = '#f0ece0';
    ctx.beginPath();
    ctx.roundRect(CX - mW + 4, mY0 - 2, (mW-4)*2, Math.min(mH * 0.4, 13), 2);
    ctx.fill();
    // Tooth dividers
    ctx.strokeStyle = '#ddd8c8'; ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(CX + i*9, mY0 - 1);
      ctx.lineTo(CX + i*9, mY0 + Math.min(mH*0.4, 12));
      ctx.stroke();
    }
  }

  // Upper lip
  ctx.fillStyle = '#b06858';
  ctx.beginPath();
  ctx.moveTo(CX-mW, mY0);
  ctx.quadraticCurveTo(CX-10, mY0-8, CX, mY0-4);
  ctx.quadraticCurveTo(CX+10, mY0-8, CX+mW, mY0);
  ctx.lineTo(CX+mW-5, mY0+5);
  ctx.quadraticCurveTo(CX, mY0+3, CX-mW+5, mY0+5);
  ctx.closePath(); ctx.fill();

  // Lower lip
  ctx.fillStyle = '#a05848';
  ctx.beginPath();
  ctx.ellipse(CX, mY0 + mH + 5, mW-4, 9, 0, 0, Math.PI);
  ctx.fill();
  ctx.restore();

}

// ── Animation loop ────────────────────────────────────────────────────────────
function animate() {
  frame++;
  if (frame % POSE_FRAMES === 0) poseIdx = (poseIdx + 1) % 4;

  // Body bob: up and down, 2 bobs per pose
  const bobY = Math.sin(frame * 0.14) * 8;

  // Slight left-right lean with the music
  const leanX = Math.sin(frame * 0.07) * 5;

  // Mouth: wide open-close on a fast sine, exaggerated
  const raw = Math.sin(frame * 0.20);
  const mouthOpen = raw > 0 ? Math.pow(raw, 0.6) : 0;

  drawTrump(mouthOpen, bobY, leanX);
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
